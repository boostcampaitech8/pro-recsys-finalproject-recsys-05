version: "3.8"

services:
  # [Backend] 諛깆뿏??怨듯넻 ?ㅼ젙
  backend:
    image: rec-server # ?꾩떆 ?대?吏 ?대쫫, prod/dev?먯꽌 ?ㅻ쾭?쇱씠????
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network
    environment:
      - DEBUG_MODE=True  # ??媛쒕컻 ?섍꼍: True, ?꾨줈?뺤뀡: False

  # [DB] PostgreSQL 怨듯넻 ?ㅼ젙
  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
      - POSTGRES_DB=${POSTGRES_DB:-mydatabase}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # [Redis] Redis 罹먯떆 怨듯넻 ?ㅼ젙
  redis:
    image: redis:alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:


networks:
  app_network:
    driver: bridge
