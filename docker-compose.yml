version: "3.8"

services:
  # [Backend] Common Configuration
  backend:
    image: rec-server # Placeholder name, overridden in prod/dev
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydatabase
      - REDIS_URL=redis://redis:6379
      - ML_REC_ROOT=/app/ml_rec
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

  # [DB] PostgreSQL Common Configuration
  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydatabase
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U myuser -d mydatabase" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # [Redis] Cache Common Configuration
  redis:
    image: redis:alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:


networks:
  app_network:
    driver: bridge
