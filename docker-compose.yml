version: "3.8"

services:
  # [Nginx] Reverse Proxy & Access Control Gateway
  nginx:
    build: ./backend/nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  # [Development] FastAPI (Internal Only)
  backend:
    build: .
    # ports removed: Only accessible via Nginx
    env_file:
      - ./backend/.env
    environment:
      # Docker 내부 통신을 위해 호스트명을 컨테이너명(db, redis)으로 지정
      - DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydatabase
      - REDIS_URL=redis://redis:6379/0
      - ML_REC_ROOT=/app/ml_rec
    volumes:
      - ./backend:/app/backend
      - ./ml_rec:/app/ml_rec
      - ./configs:/app/configs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

  # PostgreSQL (DB) - Internal Only
  db:
    image: pgvector/pgvector:pg15
    # ports removed: Only accessible within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydatabase
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U myuser -d mydatabase" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis (Cache) - Internal Only
  redis:
    image: redis:alpine
    # ports removed: Only accessible within Docker network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:


networks:
  app_network:
    driver: bridge
