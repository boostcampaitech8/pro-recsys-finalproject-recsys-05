# 운영 구성 (Oracle A1.Flex 2 OCPU/12GB arm64, Always Free)
# - 단독 실행 파일: docker compose -f docker-compose.prod.yml up -d  (base compose와 병합하지 않음)
# - 3-stage 구성: bentoml 포함 (실측 여유 8GB+, mem 4G 제한). bentoml 미기동/장애 시 backend가
#   로컬 EASE로 자동 폴백 (backend는 bentoml을 depends_on 하지 않아 로딩 180s 동안 즉시 기동).
#   cadvisor는 여전히 제외 (모니터링은 서버 네이티브 Grafana).
# - 앱 시크릿은 서버의 ./.env 에서 공급 (계약: .env.example)
# - backend 데이터(games_metadata.jsonl, item_similarity.pkl)는 호스트 bind-mount로 공급
# - bentoml 아티팩트(EASE backend-format 1.27GB·dcn·xgb·lightgcn)도 호스트 bind-mount로 공급
#   (이미지엔 없음 — .dockerignore가 saved_models/candidates/dataset 제외). deploy.sh preflight가 상주 검증.
services:
  frontend:
    image: ${DOCKER_USERNAME:-rlaqudwn}/rec-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      # busybox wget이 localhost를 ::1로 선해석하는데 nginx는 IPv4만 리스닝 → 127.0.0.1 명시
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    image: ${DOCKER_USERNAME:-rlaqudwn}/rec-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    env_file:
      - ./.env
    environment:
      - ENV=prod
      - DEBUG_MODE=False
      - GOOGLE_APPLICATION_CREDENTIALS=/app/configs/gcs/gcs_key.json
      # bge-m3(~2.3GB)를 재배포 간 재다운로드하지 않도록 HF 캐시를 볼륨에 고정
      - HF_HOME=/data/hf-cache
    volumes:
      - ./configs/gcs:/app/configs/gcs:ro
      - ./backend/app/data:/app/backend/app/data
      - hf_cache:/data/hf-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      # 최초 부팅: bge-m3 다운로드 + DB 시드(테이블 비었을 때만) 감안
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4G

  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
      - POSTGRES_DB=${POSTGRES_DB:-mydatabase}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1536M

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M

  # BentoML 3-Stage 추천 서비스 (retrieval→ranking→scoring)
  # - 이미지는 CI(build_push)가 ml_rec/Dockerfile.bentoml로 arm64 빌드/푸시
  # - 아티팩트는 호스트 bind-mount (이미지엔 미포함). GCS 부트스트랩은 스킵 (BENTOML_SKIP_GCS_BOOTSTRAP)
  # - backend는 이 서비스를 depends_on 하지 않음: 미기동/장애 시 EASE 폴백 (무중단)
  bentoml:
    image: ${DOCKER_USERNAME:-rlaqudwn}/rec-bentoml:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - BENTOML_SKIP_GCS_BOOTSTRAP=true   # 아티팩트는 bind-mount로 공급 — GCS 다운로드 불필요
      - ML_REC_ROOT=/app/ml_rec
    volumes:
      - ./ml_rec/saved_models:/app/ml_rec/saved_models
      - ./ml_rec/candidates:/app/ml_rec/candidates
      - ./ml_rec/dataset:/app/ml_rec/dataset
      - ./ml_rec/logs:/app/ml_rec/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 10
      # EASE backend-format(1.27GB) + dcn/xgb/lightgcn 로드 시간 감안
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  postgres_data:
  hf_cache:

networks:
  app-network:
    driver: bridge
