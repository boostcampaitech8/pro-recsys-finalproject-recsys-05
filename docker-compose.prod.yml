version: "3.8"

services:
  # [Nginx] лҰ¬лІ„???„лЎқ??л°??‘к·ј ?ңм–ҙ кІҢмқҙ?ёмӣЁ??
  # Nginx???ҙмҳҒ(Production) ?ҳкІҪ?җм„ңл§??Өн–ү?©лӢҲ??
  nginx:
    build: ./backend/nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  # [Backend] ?ҙмҳҒ ?ҳкІҪ ?„мҡ© ?Өм •
  backend:
    build:
      context: .
      target: runner
    image: ${DOCKER_USERNAME}/rec-server:latest
    restart: unless-stopped
    # ?ёмҠӨ???¬нҠё ?ём¶ң ?ҶмқҢ, ?ҙл? ?ӨнҠё?ҢнҒ¬л§??¬мҡ©
    # ліјлҘЁ л§Ҳмҡҙ???ҶмқҢ (?ҙл?м§Җ ?ҙл? мҪ”л“ң ?¬мҡ©)

    # ?ҳкІҪ ліҖ???ӨлІ„?јмқҙ??(?ңлІ„??.env ?Ңмқј?җм„ң мЈјмһ…??
    env_file:
      - ./.env
    environment:
      - GCS_KEY_BASE64=${GCS_KEY_BASE64}
      - STEAM_API_KEY=${STEAM_API_KEY}

  # [Monitoring] cAdvisor (м»Ён…Ң?ҙл„Ҳ лҰ¬мҶҢ???¬мҡ©??лӘЁлӢҲ?°л§Ғ)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command: ["/usr/bin/cadvisor", "--url_base_prefix=/monitor"]
    # ?ёмҠӨ???¬нҠё ?ём¶ң ???? ?Өм§Ғ ?ҙл? ?ӨнҠё?ҢнҒ¬(Nginx)лҘ??өн•ҙ?ңл§Ң ?‘к·ј к°Җ??
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - app_network
  # DB?Җ Redis??Base ?Өм •??к·ёл?лЎ??¬мҡ© (?ёл? ?¬нҠё ?ём¶ң ?ҶмқҢ)
