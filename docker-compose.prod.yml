version: "3.8"

services:
  # [Nginx] 리버스 프록시 및 접근 제어 게이트웨이
  # Nginx는 운영(Production) 환경에서만 실행됩니다.
  nginx:
    build: ./backend/nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  # [Backend] 운영 환경 전용 설정
  backend:
    image: rlaqudwn/rec-server:dev # 또는 :latest
    restart: unless-stopped
    # 호스트 포트 노출 없음, 내부 네트워크만 사용
    # 볼륨 마운트 없음 (이미지 내부 코드 사용)

    # 환경 변수 오버라이드 (서버의 .env 파일에서 주입됨)
    env_file:
      - ./.env
    environment:
      - GCS_KEY_BASE64=${GCS_KEY_BASE64}
      - STEAM_API_KEY=${STEAM_API_KEY}

  # [Monitoring] cAdvisor (컨테이너 리소스 사용량 모니터링)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command: ["/usr/bin/cadvisor", "--url_base_prefix=/monitor"]
    # 호스트 포트 노출 안 함, 오직 내부 네트워크(Nginx)를 통해서만 접근 가능
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - app_network
  # DB와 Redis는 Base 설정을 그대로 사용 (외부 포트 노출 없음)
