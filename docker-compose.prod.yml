version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  backend:
    image: ${DOCKER_USERNAME}/rec-server:${IMAGE_TAG:-latest}
    restart: unless-stopped

    env_file:
      - ./.env
    environment:
      - GCS_KEY_BASE64=${GCS_KEY_BASE64}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - CLOVA_API_KEY=${CLOVA_API_KEY}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    command: [ "/usr/bin/cadvisor", "--url_base_prefix=/monitor" ]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - app_network
