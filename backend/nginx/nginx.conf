events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ==========================================================
        # [Secure Zone] (Tailscale Network Only: 100.64.0.0/10)
        # ==========================================================
        # API 문서 및 내부 테스트용
        location ~ ^/(docs|redoc|openapi.json|test|metrics|admin) {
            # Tailscale IP 대역 허용
            allow 100.64.0.0/10;
            # 로컬(Docker 내부) 및 내부망 허용
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            # 그 외 모두 차단
            deny all;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==========================================================
        # [Public Zone] (Open to World)
        # ==========================================================
        # 일반 API 및 Health Check
        location / {
            # 모든 접근 허용
            allow all;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
