[project]
name = "backend-recsys"
version = "0.1.0"
description = "백엔드와 추천엔진이 공유하는 uv 공간입니다"
authors = [
    {name = "rlaqudwn1", email = "162764129+rlaqudwn1@users.noreply.github.com"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.128.0",
    "uvicorn>=0.40.0",
    "pandas>=2.2.0",
    "torch==2.2.0",
    "torchvision==0.17.0",
]

# [tool.uv] 섹션에서 패키지 소스(Index)를 관리합니다.
# Pytorch CPU 버전을 우선적으로 찾도록 설정합니다.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }