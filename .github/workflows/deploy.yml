name: Production CI/CD

on:
  # 1. PR 검증 (기존과 동일)
  pull_request:
    branches: [ "dev", "main" ]

  # 2. main/dev push 시 (기존과 동일 - latest 갱신)
  push:
    branches: [ "main", "dev" ]
    # 태그가 'v'로 시작하면 빌드/배포 (예: v1.0.0)
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------
  # [테스트: Pytest & Lint]
  # GitHub Services를 사용해 격리된 DB/Redis 환경에서 테스트합니다.
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      # 1. PostgreSQL (pgvector 지원)
      db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        # DB 준비 완료까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 2. Redis
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # uv 설치 및 캐싱 (간단 설치 스크립트 사용)
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Run Pytest
        env:
          # 서비스 컨테이너(localhost)로 연결
          DATABASE_URL: postgresql+asyncpg://myuser:mypassword@localhost:5432/mydatabase
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          # uv run으로 가상환경 없이 실행
          uv run pytest test/

  pipeline:
    needs: test  # 테스트 통과 후 빌드/배포 진행
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------------------------------------------------
      # [검증: Docker Compose 실행 및 헬스 체크]
      # PR 및 모든 푸시에서 실행되어 DB 연결 정상 여부를 확인합니다.
      # ---------------------------------------------------
      - name: Create env file from secrets
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          ML_REC_ROOT=${{ secrets.ML_REC_ROOT }}
          STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
          EOF
          echo ".env file created successfully"

      - name: Build and Run with Docker Compose
        run: |
          # Use Base + Prod override
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
          echo "Waiting for services to start..."
          sleep 20  # DB 초기화/서버 기동 대기

      - name: Check Health (Integration Test)
        run: |
          # 5회 재시도 (최대 50초 대기)
          for i in {1..5}; do
            if curl -f http://localhost:80/health/db; then
              echo "Health Check Passed!"
              exit 0
            fi
            echo "Retrying... ($i/5)"
            sleep 10
          done
          echo "Health Check Failed!"
          # 실패 시 로그 출력 (디버깅용)
          docker compose logs
          exit 1

      - name: Tear Down
        if: always()
        run: docker compose down

      # ---------------------------------------------------
      # [태그 메타데이터 추출]
      # ---------------------------------------------------
      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/rec-server
          # 이미지 태그 자동 생성
          tags: |
            # 1. 태그가 있으면 해당 태그 사용 (예: v1.0.0)
            type=ref,event=tag
            # 2. main 브랜치는 latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # 3. dev 브랜치는 dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # 4. 커밋 해시 (a1b2c3d) - 기본 포함
            type=sha,format=short

      # ---------------------------------------------------
      # [빌드 및 푸시]
      # ---------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push
        # PR은 제외하고 Push (Tag 또는 main/dev push)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 위에서 생성한 메타 태그 적용
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------
  # [자동 배포: SSH 접속 후 스크립트 실행]
  # ---------------------------------------------------
  deploy:
    needs: pipeline  # 빌드 성공 시 실행
    if: github.event_name != 'pull_request'  # PR은 배포 제외 (Push만)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Tailscale 네트워크 연결 (VPN)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # 2. 배포 파일 전송 (SCP)
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "deploy.sh,docker-compose.yml,docker-compose.prod.yml,backend/nginx"
          target: "/home/${{ secrets.SSH_USERNAME }}/"

      # 3. SSH 접속 후 스크립트 실행
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }} # Tailscale IP or Name
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # .env 파일 생성 (권한 제한을 위해 별도 파일로 생성)
            ENV_PATH="/home/${{ secrets.SSH_USERNAME }}/.env"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > "$ENV_PATH"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> "$ENV_PATH"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> "$ENV_PATH"
            echo "GCS_KEY_BASE64=${{ secrets.GCS_KEY_BASE64 }}" >> "$ENV_PATH"
            echo "STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}" >> "$ENV_PATH"
            chmod 600 "$ENV_PATH"

            # 배포 스크립트 실행
            chmod +x ./deploy.sh
            ./deploy.sh
