# 배포 잡(pipeline: 이미지 빌드/푸시 + GCP SSH 배포)은 배포 서버 사망으로 제거됨.
# Phase 3(Oracle A1.Flex 이전) 때 ARM buildx + frontend 빌드 포함해 재작성 예정 — 원본은 git 히스토리 참조.
name: CI

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ---------------------------------------------------
  # [테스트: Pytest & Lint]
  # GitHub Native Service를 사용하여 격리된 DB/Redis 환경에서 테스트합니다.
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      # 1. PostgreSQL (pgvector 지원)
      db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        # DB가 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 2. Redis
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # curl 설치 제거하고 공식 action으로 교체 + uv cache 활성화
      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: backend

      # venv 자체도 캐시 (lock 안 바뀌면 uv sync 거의 0초)
      - name: Cache backend .venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('backend/uv.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py311-venv-

      - name: Install Dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Run Pytest
        env:
          # 서비스 컨테이너(localhost)로 연결
          DATABASE_URL: postgresql+asyncpg://myuser:mypassword@localhost:5432/mydatabase
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          # uv run을 통해 가상환경 내에서 실행
          uv run pytest test/

  # ---------------------------------------------------
  # [PR 이미지 빌드 검증: Docker Compose (override)]
  # Dockerfile 회귀만 잡는다. 부팅/헬스체크 검증은 하지 않음:
  # CI에는 모델 아티팩트가 없어 bentoml이 뜰 수 없고, backend는
  # 기동 시 bge-m3(~2.3GB) 로딩이 완료돼야 응답해 CI에 부적합.
  # ---------------------------------------------------
  compose_pr:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create dummy backend env (override의 env_file 참조용, 빌드엔 secrets 불필요)
        run: |
          mkdir -p configs/backend
          cat > configs/backend/.env << EOF
          ENV=ci
          DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydatabase
          REDIS_URL=redis://redis:6379/0
          ML_REC_ROOT=/app/ml_rec
          EOF

      - name: Build images (backend, frontend)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml build backend frontend
