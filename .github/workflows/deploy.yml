name: Production CI/CD

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ---------------------------------------------------
  # [테스트: Pytest & Lint]
  # GitHub Native Service를 사용하여 격리된 DB/Redis 환경에서 테스트합니다.
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      # 1. PostgreSQL (pgvector 지원)
      db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        # DB가 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 2. Redis
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # curl 설치 제거하고 공식 action으로 교체 + uv cache 활성화
      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: backend

      # venv 자체도 캐시 (lock 안 바뀌면 uv sync 거의 0초)
      - name: Cache backend .venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('backend/uv.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py311-venv-

      - name: Install Dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Run Pytest
        env:
          # 서비스 컨테이너(localhost)로 연결
          DATABASE_URL: postgresql+asyncpg://myuser:mypassword@localhost:5432/mydatabase
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          # uv run을 통해 가상환경 내에서 실행
          uv run pytest test/

  # ---------------------------------------------------
  # [PR 통합 테스트: Docker Compose (override)]
  # PR일 때만 로컬 개발용 override로 통합 테스트합니다.
  # ---------------------------------------------------
  compose_pr:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # 빠른 피드백 루프를 위해 도커/컴포즈 변경이나 API 관련일 때만 수행
    # paths 설정은 GitHub Actions 내장 기능이 아니므로, PR에서 관련 파일이 변경되었는지 
    # 별도 step에서 확인하거나 트리거 단에 paths를 추가해야 하지만, 현 구조(Job 레벨 제어) 유지.
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create backend env for compose_pr (local-style)
        run: |
          # 1. 루트 .env (Docker Compose 변수 치환용)
          cat > .env << EOF
          POSTGRES_USER=myuser
          POSTGRES_PASSWORD=mypassword
          POSTGRES_DB=mydatabase
          DOCKER_USERNAME=local
          IMAGE_TAG=dev
          EOF

          # 2. configs/backend/.env (백엔드 애플리케이션용)
          mkdir -p configs/backend
          cat > configs/backend/.env << EOF
          ENV=ci
          DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydatabase
          REDIS_URL=redis://redis:6379/0
          ML_REC_ROOT=/app/ml_rec
          BENTOML_SKIP_GCS_BOOTSTRAP=true
          STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
          GCS_KEY_BASE64=${{ secrets.GCS_KEY_BASE64 }}
          CLOVA_API_KEY=${{ secrets.CLOVA_API_KEY }}
          CLOVA_BASE_URL=${{ secrets.CLOVA_BASE_URL }}
          EOF

      - name: Build and Run with Docker Compose (override)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml build
          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          echo "Waiting for services to start..."
          sleep 20

      - name: Check Health (Integration Test)
        run: |
          for i in {1..5}; do
            if curl -f http://localhost:8000/health/db; then
              echo "Health Check Passed!"
              exit 0
            fi
            echo "Retrying... ($i/5)"
            sleep 10
          done
          echo "Health Check Failed!"
          docker compose logs
          exit 1

      - name: Tear Down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml down

  # ---------------------------------------------------
  # [배포: Build & Deploy]
  # 테스트가 성공했을 때만 실행됩니다.
  # ---------------------------------------------------
  pipeline:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      # ---------------------------------------------------
      # [환경 변수 설정]
      # .env 파일을 생성하여 Docker Compose 빌드/실행 시 사용
      # ---------------------------------------------------
      - name: Create env file from secrets
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          ML_REC_ROOT=${{ secrets.ML_REC_ROOT }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
          GCS_KEY_BASE64=${{ secrets.GCS_KEY_BASE64 }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          CLOVA_API_KEY=${{ secrets.CLOVA_API_KEY }}
          CLOVA_BASE_URL=${{ secrets.CLOVA_BASE_URL }}
          IMAGE_TAG=${IMAGE_TAG}
          EOF

      - name: Build Backend Image (runner)
        uses: docker/build-push-action@v4
        with:
          context: .
          target: runner
          tags: ${{ secrets.DOCKER_USERNAME }}/rec-server:${{ env.IMAGE_TAG }}
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build BentoML Image
        uses: docker/build-push-action@v4
        with:
          context: ./ml_rec
          file: ./ml_rec/Dockerfile.bentoml
          tags: ${{ secrets.DOCKER_USERNAME }}/rec-bentoml:${{ env.IMAGE_TAG }}
          push: false
          cache-from: type=gha,scope=bentoml
          cache-to: type=gha,mode=max,scope=bentoml

      # ---------------------------------------------------
      # [통합 테스트: Docker Compose]
      # 실제 컨테이너들이 잘 뜨는지(Health Check) 확인
      # ---------------------------------------------------
      - name: Build and Run with Docker Compose
        run: |
          # Use Base + Prod override (이미지 pull 기반)
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          echo "Waiting for services to start..."
          sleep 20  # DB 초기화 및 서버 구동 대기

      - name: Check Health (Integration Test)
        run: |
          # 5번 재시도 (총 50초 대기)
          for i in {1..5}; do
            if curl -f http://localhost:80/health/db; then
              echo "Health Check Passed!"
              exit 0
            fi
            echo "Retrying... ($i/5)"
            sleep 10
          done
          echo "Health Check Failed!"
          # 실패 시 로그 출력 (디버깅용)
          docker compose logs
          exit 1

      - name: Tear Down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rec-server:${{ env.IMAGE_TAG }}

      - name: Push BentoML Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rec-bentoml:${{ env.IMAGE_TAG }}

    # ---------------------------------------------------
    # [서버 배포: SSH]
    # ---------------------------------------------------
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Copy files to Server
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.yml,docker-compose.prod.yml,deploy.sh,.env,backend/nginx,Dockerfile"
          target: "pro-recsys-finalproject-recsys-05"

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export GCS_KEY_BASE64='${{ secrets.GCS_KEY_BASE64 }}'
            export STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
            export CLOVA_API_KEY=${{ secrets.CLOVA_API_KEY }}

            # Deploy Script 실행
            cd ~/pro-recsys-finalproject-recsys-05
            sed -i 's/\r$//' deploy.sh
            chmod +x deploy.sh
            ./deploy.sh
