name: Build and Push Docker Image

# 언제 발동할 것인가? (main 브랜치에 push 될 때)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 가져오기
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 도커 로그인 (비밀번호는 깃허브 Secrets에 숨겨야 함)
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. 빌드 및 푸시 (캐시 적용으로 속도 향상)
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/rec-server:latest
        # 캐싱을 통해 빌드 속도 최적화
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rec-server:cache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rec-server:cache,mode=max

    # 4. (선택) 헬스 체크는 배포 후에 하는 거라 여기선 생략
    # 대신 이미지가 잘 구워졌는지 확인하는 echo
    - name: Verify
      run: echo "이미지 및 도커허브 푸시 완료 외부 아이피 확인하고 CD를 확인하세요"