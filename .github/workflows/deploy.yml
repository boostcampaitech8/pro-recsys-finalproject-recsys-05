name: Production CI/CD

on:
  # 1. PR 검증 (기존과 동일)
  pull_request:
    branches: [ "dev", "main" ]
  
  # 2. 메인 브랜치 푸시 (기존과 동일 - latest 갱신용)
  push:
    branches: [ "main" ]
    # ★ 추가된 부분: 'v'로 시작하는 태그가 달리면 갱신 (예: v1.0.0)
    tags:
      - 'v*'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # (중간 생략: Python 세팅, Pytest 등은 동일) ...

    # ---------------------------------------------------
    # [태그 이름 추출]
    # ---------------------------------------------------
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/rec-server
        # 도커 태그를 자동으로 생성
        tags: |
          # 1. 태그가 있으면 그 태그 이름 사용 (예: v1.0.0)
          type=ref,event=tag
          # 2. 메인 브랜치면 latest 붙임
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          # 3. 커밋 해시 (a1b2c3d) - 항상 붙임 (롤백용)
          type=sha,format=short

    # ---------------------------------------------------
    # [빌드 및 푸시]
    # ---------------------------------------------------
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push
      # PR이 아닐 때만 Push (Tag거나 Main Push거나)
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 위에서 만든 메타 태그들을 한방에 적용
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}