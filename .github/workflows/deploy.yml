name: Production CI/CD

on:
  # 1. PR 검증 (기존과 동일)
  pull_request:
    branches: [ "dev", "main" ]
  
  # 2. 메인 브랜치 푸시 (기존과 동일 - latest 갱신용)
  push:
    branches: [ "main", "dev" ]
    # ★ 추가된 부분: 'v'로 시작하는 태그가 달리면 갱신 (예: v1.0.0)
    tags:
      - 'v*'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ---------------------------------------------------
    # [검증: Docker Compose로 실행 및 헬스 체크]
    # PR 및 모든 푸시에서 실행되어, 서버가 정상적으로 DB에 붙는지 테스트합니다.
    # ---------------------------------------------------
    - name: Create backend env file from secrets
      run: |
        mkdir -p backend
        cat > backend/.env << EOF
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        REDIS_URL=${{ secrets.REDIS_URL }}
        ML_REC_ROOT=${{ secrets.ML_REC_ROOT }}
        STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
        EOF
        echo "✅ backend/.env file created successfully"

    - name: Build and Run with Docker Compose
      run: |
        # Use Base + Prod override
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
        echo "Waiting for services to start..."
        sleep 20  # DB 초기화 및 서버 구동 대기

    - name: Check Health (Integration Test)
      run: |
        # 5번 재시도 (총 50초 대기)
        for i in {1..5}; do
          if curl -f http://localhost:80/health/db; then
            echo "Health Check Passed!"
            exit 0
          fi
          echo "Retrying... ($i/5)"
          sleep 10
        done
        echo "Health Check Failed!"
        # 실패 시 로그 출력 (디버깅용)
        docker compose logs
        exit 1

    - name: Tear Down
      if: always()
      run: docker compose down

    # ---------------------------------------------------
    # [태그 이름 추출]
    # ---------------------------------------------------
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/rec-server
        # 도커 태그를 자동으로 생성
        tags: |
          # 1. 태그가 있으면 그 태그 이름 사용 (예: v1.0.0)
          type=ref,event=tag
          # 2. 메인 브랜치면 latest 붙임
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          # 3. dev 브랜치면 dev 붙임
          type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
          # 3. 커밋 해시 (a1b2c3d) - 항상 붙임 (롤백용)
          type=sha,format=short

    # ---------------------------------------------------
    # [빌드 및 푸시]
    # ------------------------------------------------ㅔ---
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push
      # PR이 아닐 때만 Push (Tag거나 Main Push거나)
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # 위에서 만든 메타 태그들을 한방에 적용
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------
  # [자동 배포: SSH 접속 후 스크립트 실행]
  # ---------------------------------------------------
  deploy:
    needs: pipeline  # 빌드가 성공하면 실행
    if: github.event_name != 'pull_request'  # PR일 때는 배포 안 함 (Push일 때만)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Tailscale 네트워크 합류 (VPN 접속)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # 2. 설정 파일 전송 (SCP)
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "deploy.sh,docker-compose.yml,docker-compose.prod.yml,backend/nginx"
          target: "/home/${{ secrets.SSH_USERNAME }}/"

      # 3. SSH 접속 후 스크립트 실행
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }} # Tailscale IP or Name
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # .env 파일 생성 (환경변수 주입 - sudo 호환성 위해 파일로 저장)
            ENV_PATH="/home/${{ secrets.SSH_USERNAME }}/.env"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > "$ENV_PATH"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> "$ENV_PATH"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> "$ENV_PATH"
            echo "GCS_KEY_BASE64=${{ secrets.GCS_KEY_BASE64 }}" >> "$ENV_PATH"
            echo "STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}" >> "$ENV_PATH"
            chmod 600 "$ENV_PATH"
            
            # 배포 스크립트 실행
            chmod +x ./deploy.sh
            ./deploy.sh
