name: Production CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # ---------------------------------------------------
  # [테스트: Pytest & Lint]
  # GitHub Native Service를 사용하여 격리된 DB/Redis 환경에서 테스트합니다.
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    services:
      # 1. PostgreSQL (pgvector 지원)
      db:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        # DB가 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 2. Redis
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # curl 설치 제거하고 공식 action으로 교체 + uv cache 활성화
      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: backend

      #venv 자체도 캐시 (lock 안 바뀌면 uv sync 거의 0초)
      - name: Cache backend .venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('backend/uv.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py311-venv-

      - name: Install Dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Run Pytest
        env:
          # 서비스 컨테이너(localhost)로 연결
          DATABASE_URL: postgresql+asyncpg://myuser:mypassword@localhost:5432/mydatabase
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          # uv run을 통해 가상환경 내에서 실행
          uv run pytest test/

  # ---------------------------------------------------
  # [배포: Build & Deploy]
  # 테스트가 성공했을 때만 실행됩니다.
  # ---------------------------------------------------
  pipeline:
    needs: test  # 테스트가 통과해야만 실행
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ---------------------------------------------------
    # [환경 변수 설정]
    # .env 파일을 생성하여 Docker Compose 빌드/실행 시 사용
    # ---------------------------------------------------
    - name: Create env file from secrets
      run: |
        cat > .env << EOF
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        REDIS_URL=${{ secrets.REDIS_URL }}
        ML_REC_ROOT=${{ secrets.ML_REC_ROOT }}
        STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
        GCS_KEY_BASE64=${{ secrets.GCS_KEY_BASE64 }}
        EOF

    # ---------------------------------------------------
    # [통합 테스트: Docker Compose]
    # 실제 컨테이너들이 잘 뜨는지(Health Check) 확인
    # ---------------------------------------------------
    - name: Build and Run with Docker Compose
      run: |
        # Use Base + Prod override
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
        echo "Waiting for services to start..."
        sleep 20  # DB 초기화 및 서버 구동 대기

    - name: Check Health (Integration Test)
      run: |
        # 5번 재시도 (총 50초 대기)
        for i in {1..5}; do
          if curl -f http://localhost:80/health/db; then
            echo "Health Check Passed!"
            exit 0
          fi
          echo "Retrying... ($i/5)"
          sleep 10
        done
        echo "Health Check Failed!"
        # 실패 시 로그 출력 (디버깅용)
        docker compose logs
        exit 1

    - name: Tear Down
      if: always()
      run: docker compose down

    # ---------------------------------------------------
    # [태그 이름 추출]
    # ---------------------------------------------------
    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/rec-server
        tags: |
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
          type=sha,format=short

    # ---------------------------------------------------
    # [빌드 및 푸시]
    # ---------------------------------------------------
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push
      # PR이 아닐 때만 Push
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    # ---------------------------------------------------
    # [서버 배포: SSH]
    # ---------------------------------------------------
    - name: Deploy to Server
      if: github.event_name != 'pull_request'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          export GCS_KEY_BASE64='${{ secrets.GCS_KEY_BASE64 }}'
          export STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
          
          # Deploy Script 실행
          cd ~/pro-recsys-finalproject-recsys-05
          ./deploy.sh
